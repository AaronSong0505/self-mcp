interests:
  objective: >
    这是 Aaron 的个人 AI 技术晨报。优先保留与 AI 技术进展、强化学习、算法、模型训练、
    推理、评测、论文、Agent 基础设施、开源实现和工程落地有关的高信息密度内容。产品发布、
    融资、市值、营销包装类新闻只有在技术含量明显较高时才保留。同时要特别留意各大 AI 公司、
    以及可能突然冒出来的黑马公司和黑马技术，不要因为没命中既有关键词就漏掉真正重要的新发布。
